  :root{
    --ground:#F4F1EA;--panel:#FFFFFF;--panel-2:#F8F6F1;--line:#E2DDD1;--line-soft:#EDE9E0;
    --ink:#2A2621;--ink-2:#4B453B;--muted:#786F61;--accent:#8A6B00;--accent-2:#5E4900;
    --deploy:#0E8A54;--marg:#B25E12;--champ:#2C6E8F;--rp:#7A5AA6;--hot:#A64B3B;
    --shadow:0 1px 2px rgba(42,38,33,.05),0 10px 30px -14px rgba(42,38,33,.2);
  }
  @media (prefers-color-scheme:dark){:root{
    --ground:#15130F;--panel:#201D18;--panel-2:#2A2620;--line:#3A342B;--line-soft:#2F2A23;
    --ink:#F1EDE4;--ink-2:#D0C9BB;--muted:#968C7C;--accent:#FFBC00;--accent-2:#FFD766;
    --deploy:#38D083;--marg:#F0863C;--champ:#6BB0D6;--rp:#B79AE0;--hot:#E5806A;
    --shadow:0 1px 2px rgba(0,0,0,.4),0 14px 34px -16px rgba(0,0,0,.65);
  }}
  :root[data-theme="light"]{--ground:#F4F1EA;--panel:#FFFFFF;--panel-2:#F8F6F1;--line:#E2DDD1;--line-soft:#EDE9E0;--ink:#2A2621;--ink-2:#4B453B;--muted:#786F61;--accent:#8A6B00;--accent-2:#5E4900;--deploy:#0E8A54;--marg:#B25E12;--champ:#2C6E8F;--rp:#7A5AA6;--hot:#A64B3B;--shadow:0 1px 2px rgba(42,38,33,.05),0 10px 30px -14px rgba(42,38,33,.2);}
  :root[data-theme="dark"]{--ground:#15130F;--panel:#201D18;--panel-2:#2A2620;--line:#3A342B;--line-soft:#2F2A23;--ink:#F1EDE4;--ink-2:#D0C9BB;--muted:#968C7C;--accent:#FFBC00;--accent-2:#FFD766;--deploy:#38D083;--marg:#F0863C;--champ:#6BB0D6;--rp:#B79AE0;--hot:#E5806A;--shadow:0 1px 2px rgba(0,0,0,.4),0 14px 34px -16px rgba(0,0,0,.65);}
  :root{--mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,"Malgun Gothic",monospace;--sans:"Malgun Gothic","Apple SD Gothic Neo",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
  *,*::before,*::after{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{margin:0;background:var(--ground);color:var(--ink);font-family:var(--sans);line-height:1.65;font-size:16px;-webkit-font-smoothing:antialiased;word-break:keep-all;overflow-wrap:break-word}
  .wrap{max-width:1200px;margin:0 auto;padding:0 22px 80px}
  header.mast{padding:40px 0 20px;border-bottom:1px solid var(--line)}
  .utilbar{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:18px}
  .eyebrow{font-family:var(--mono);font-size:11.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);font-weight:600}
  .themebtn{width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:var(--panel);color:var(--ink-2);cursor:pointer;font-size:14px;display:inline-flex;align-items:center;justify-content:center;flex:none}
  .themebtn:hover{border-color:var(--accent)}
  h1.title{font-family:var(--mono);font-weight:600;font-size:clamp(24px,4.4vw,36px);line-height:1.15;letter-spacing:-.015em;margin:0}
  h1.title span.gx{background:linear-gradient(92deg,var(--accent),var(--champ) 70%);-webkit-background-clip:text;background-clip:text;color:transparent}
  .back{font-size:13px;color:var(--muted);text-decoration:none;font-family:var(--mono)}
  .back:hover{color:var(--accent)}

  /* ── 잠금 화면 ── */
  .gate{max-width:520px;margin:80px auto;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:34px 32px;box-shadow:var(--shadow)}
  .gate h2{margin:0 0 6px;font-size:19px;font-family:var(--mono)}
  .gate p{margin:0 0 20px;color:var(--muted);font-size:14px}
  .gate label{display:block;font-size:12.5px;color:var(--ink-2);margin-bottom:7px;font-weight:600}
  .gate input{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:9px;background:var(--panel-2);color:var(--ink);font-size:15px;font-family:var(--mono)}
  .gate input:focus{outline:2px solid var(--accent);outline-offset:1px;border-color:var(--accent)}
  .gate button{margin-top:14px;width:100%;padding:11px;border:none;border-radius:9px;background:var(--accent);color:var(--ground);font-weight:700;font-size:15px;cursor:pointer;font-family:var(--sans)}
  .gate button:hover{background:var(--accent-2)}
  .gate button:disabled{opacity:.55;cursor:default}
  .gerr{margin-top:12px;color:var(--hot);font-size:13.5px;min-height:20px}

  /* ── 탭 ── */
  .tabbar{display:flex;gap:8px;margin:26px 0 8px;flex-wrap:wrap}
  .tb{padding:9px 20px;border:1px solid var(--line);background:var(--panel);color:var(--ink-2);border-radius:999px;cursor:pointer;font-family:var(--mono);font-size:14px;font-weight:600}
  .tb:hover{border-color:var(--accent)}
  .tb[aria-selected="true"]{background:var(--accent);color:var(--ground);border-color:var(--accent)}

  /* ── 본문 ── */
  .tabpane{padding-top:14px}
  .kicker{font-family:var(--mono);font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:600;margin:16px 0 4px}
  h2{font-size:clamp(21px,3.4vw,28px);margin:0 0 14px;letter-spacing:-.01em;line-height:1.3}
  h3{font-size:17.5px;margin:36px 0 10px;letter-spacing:-.01em;padding-top:16px;border-top:1px solid var(--line-soft)}
  h3.star{border-top:2px solid var(--accent);color:var(--accent)}
  h4{font-size:15.5px;margin:24px 0 6px;color:var(--accent);font-family:var(--mono);font-weight:700}
  p{margin:11px 0}
  ul{margin:11px 0;padding-left:20px}li{margin:6px 0}
  code{background:var(--panel-2);padding:1.5px 5px;border-radius:4px;font-family:var(--mono);font-size:.87em}
  .dim{color:var(--muted);font-weight:400}
  .lead{font-size:17px;line-height:1.72;background:var(--panel);border-left:3px solid var(--accent);padding:16px 20px;border-radius:0 10px 10px 0;margin:18px 0}
  .note{background:var(--panel-2);border-left:3px solid var(--muted);padding:12px 16px;border-radius:0 8px 8px 0;font-size:14.5px;margin:16px 0}
  .warn{background:var(--panel);border-left:3px solid var(--marg);padding:13px 17px;border-radius:0 8px 8px 0;font-size:14.5px;margin:16px 0;box-shadow:var(--shadow)}

  .tw{overflow-x:auto;margin:16px 0;border:1px solid var(--line);border-radius:10px;background:var(--panel)}
  table{border-collapse:collapse;width:100%;font-size:14px;min-width:480px}
  th,td{padding:9px 13px;text-align:left;border-bottom:1px solid var(--line-soft);vertical-align:top}
  thead th{background:var(--panel-2);font-weight:700;font-size:12.5px;white-space:nowrap;border-bottom:1px solid var(--line)}
  tbody tr:last-child td{border-bottom:none}
  td.n,th.n{text-align:right;font-variant-numeric:tabular-nums;font-family:var(--mono);white-space:nowrap}
  tr.tot td{font-weight:700;background:var(--panel-2)}
  tr.hi td{background:color-mix(in srgb,var(--accent) 9%,transparent)}
  .pos{color:var(--deploy);font-weight:600}.neg{color:var(--hot);font-weight:600}
  .b{font-weight:700;color:var(--accent)}
  .warn2{color:var(--marg);font-weight:600}
  b.sev{color:var(--hot)}
  ul.flaws li{margin:9px 0}

  .funnel{margin:18px 0}
  .funnel .fs{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px 18px;box-shadow:var(--shadow)}
  .funnel .fs b{display:block;font-family:var(--mono);font-size:15px}
  .funnel .fs span{font-size:13px;color:var(--muted)}
  .funnel .fa{text-align:center;color:var(--accent);font-size:15px;padding:5px 0}

  .finding{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:18px 0}
  .fitem{background:var(--panel);border:1px solid var(--line);border-top:3px solid var(--accent);border-radius:10px;padding:16px 20px;box-shadow:var(--shadow)}
  .fitem .fh{font-family:var(--mono);font-size:19px;font-weight:700;color:var(--accent);margin:0 0 8px}
  .fitem p{font-size:14.5px;margin:0}
  @media(max-width:720px){.finding{grid-template-columns:1fr}}

  .verdict{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:8px 24px 20px;margin:18px 0;box-shadow:var(--shadow)}
  .vh{font-family:var(--mono);font-size:14px;font-weight:700;margin:20px 0 6px;padding-bottom:5px;border-bottom:1px solid var(--line-soft)}
  .vpos{color:var(--deploy)}.vneg{color:var(--hot)}.vwarn{color:var(--marg)}
  .verdict ul{margin:8px 0 0}.verdict li{font-size:14.5px}

  footer{margin-top:56px;padding-top:20px;border-top:1px solid var(--line);color:var(--muted);font-size:13px}
  footer a{color:var(--accent)}
  @media(max-width:640px){body{font-size:15px}.wrap{padding:0 14px 50px}}
  @media print{.gate,.tabbar,.themebtn{display:none!important}.tabpane{display:block!important}
    body{background:#fff;color:#000}.tw,table,.fitem,.verdict{page-break-inside:avoid}}
</style>

  var gate=document.getElementById('gate'), pw=document.getElementById('pw'),
      go=document.getElementById('go'), err=document.getElementById('err'),
      content=document.getElementById('content'), ft=document.getElementById('ft');

  function b642buf(b){var s=atob(b),a=new Uint8Array(s.length);for(var i=0;i<s.length;i++)a[i]=s.charCodeAt(i);return a;}

  function bindTabs(){
    var tabs=content.querySelectorAll('.tb'), panes=content.querySelectorAll('.tabpane');
    function show(id){
      tabs.forEach(function(t){t.setAttribute('aria-selected', t.dataset.tab===id?'true':'false');});
      panes.forEach(function(p){p.hidden = (p.id!=='pane-'+id);});
      try{history.replaceState(null,'','#'+id);}catch(e){}
    }
    tabs.forEach(function(t){t.addEventListener('click',function(){show(t.dataset.tab);});});
    var h=(location.hash||'').replace('#',''); show(['k','b','cmp','x'].indexOf(h)>=0?h:'k');
  }

  async function unlock(){
    var p=pw.value; if(!p){err.textContent='암호를 입력하세요.';return;}

      var km=await crypto.subtle.importKey('raw',enc.encode(p),'PBKDF2',false,['deriveKey']);

      err.textContent=''; pw.value='';
      gate.hidden=true; content.hidden=false; ft.hidden=false;
      bindTabs();
    }catch(e){
      err.textContent='암호가 올바르지 않습니다.'; go.disabled=false; pw.select();

  pw.addEventListener('keydown',function(e){if(e.key==='Enter')unlock();});
