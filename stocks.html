     EPS 리비전 드리프트(배포 코어)와 혼동되지 않게 상단에 구분 문구(.fxsep)를 강제 노출. */

  a:focus-visible,button:focus-visible,input:focus-visible,[role="option"]:focus-visible,.fchip:focus-visible,.item:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

(function(){

  var META={
    rsi:{d:"14일 상승/하락 압력의 균형(0~100). 통상 70↑ 과매수·30↓ 과매도.",s:function(v){return v>=70?["과매수","hot"]:v<=30?["과매도","cold"]:["중립","neut"];}},
    stoch:{d:"최근 14일 고·저 범위 안에서 종가 위치(0~100). 80↑ 과매수·20↓ 과매도.",s:function(v){return v>=80?["과매수","hot"]:v<=20?["과매도","cold"]:["중립","neut"];}},
    mfi:{d:"거래량 가중 RSI — 자금 유출입 압력(0~100). 80↑ 과매수·20↓ 과매도.",s:function(v){return v>=80?["과매수","hot"]:v<=20?["과매도","cold"]:["중립","neut"];}},
    willr:{d:"최근 고점 대비 종가 위치(0~100 환산). 80↑ 과매수·20↓ 과매도.",s:function(v){return v>=80?["과매수","hot"]:v<=20?["과매도","cold"]:["중립","neut"];}},
    cci:{d:"가격의 평균 대비 이탈도. +100↑ 과매수·−100↓ 과매도.",s:function(v){return v>=100?["과매수","hot"]:v<=-100?["과매도","cold"]:["중립","neut"];}},
    pctb:{d:"볼린저 밴드 안 위치(1=상단·0=하단). 1↑ 상단돌파·0↓ 하단이탈.",s:function(v){return v>=1?["상단돌파","hot"]:v<=0?["하단이탈","cold"]:v>=0.8?["상단권","hot"]:v<=0.2?["하단권","cold"]:["중앙","neut"];}},
    pos52:{d:"52주 최고가 대비 현재가(%). 100=신고가·95↑ 고점 근접.",s:function(v){return v>=95?["신고가권","hot"]:v>=80?["고점 근접","hot"]:v<=60?["저점권","cold"]:["중간","neut"];}},
    adx:{d:"추세의 강도(방향과 무관). 25↑ 강한 추세·20↓ 횡보.",s:function(v){return v>=25?["강한 추세","neut"]:v<20?["횡보","neut"]:["추세 보통","neut"];}},
    d50:{d:"50일 이동평균 대비 이격(%). +면 위·−면 아래.",s:function(v){return v>=10?["크게 위","good"]:v>0?["위","good"]:v<=-10?["크게 아래","watch"]:["아래","watch"];}},
    d200:{d:"200일 이동평균 대비 이격(%) — 장기 추세 기준선.",s:function(v){return v>=10?["크게 위","good"]:v>0?["위","good"]:v<=-10?["크게 아래","watch"]:["아래","watch"];}},
    macdh:{d:"MACD−시그널 차이. +면 상승 모멘텀·−면 하락 모멘텀.",s:function(v){return v>0?["상승","good"]:v<0?["하락","watch"]:["중립","neut"];}},
    aroon:{d:"상승·하락 추세의 우열(−100~+100). +면 상승 추세.",s:function(v){return v>=50?["강한 상승","good"]:v>0?["상승 추세","good"]:v<=-50?["강한 하락","watch"]:["하락 추세","watch"];}},
    roc1m:{d:"최근 1개월 가격 변화율(%).",s:function(v){return v>0?["강세","good"]:["약세","watch"];}},
    roc3m:{d:"최근 3개월 가격 변화율(%).",s:function(v){return v>0?["강세","good"]:["약세","watch"];}},
    roc6m:{d:"최근 6개월 가격 변화율(%).",s:function(v){return v>0?["강세","good"]:["약세","watch"];}},
    rs3m:{d:"3개월 초과수익(vs SPY, %p). +면 시장 대비 강세.",s:function(v){return v>0?["시장대비 강","good"]:["시장대비 약","watch"];}},
    atrp:{d:"일중 변동폭(ATR)의 가격 대비 비율(%). 클수록 변동성 큼.",s:function(v,p){return p>=70?["고변동","watch"]:p<=30?["저변동","neut"]:["보통","neut"];}},
    vol:{d:"최근 1년 실현변동성(연율화, %).",s:function(v,p){return p>=70?["고변동","watch"]:p<=30?["저변동","neut"]:["보통","neut"];}},

    rvol:{d:"최근 5일 평균 거래량 ÷ 60일 평균. 1.3↑ 급증·0.7↓ 위축.",s:function(v){return v>=1.3?["거래량 급증","cold"]:v<=0.7?["거래량 위축","neut"]:["보통","neut"];}},
    dtc:{d:"공매도잔량 ÷ 하루 평균거래량 = 전량 청산에 걸리는 일수. 높을수록 과밀숏(스퀴즈 소지). 격주 갱신(FINRA).",s:function(v){return v>=7?["과밀숏","hot"]:v>=4?["숏 부담","watch"]:["보통","neut"];}},

  function grpSummary(g,items){var c={hot:0,cold:0,good:0,watch:0,neut:0};

  // preset: [key,label,comp,asc,flag,timingSet]

  var PRESETS=[
    ["swingbuy",'<span style="color:var(--good)">▲</span> 스윙 저점매수',"momentum",false,null,null,"r"],
    ["swingsell",'<span style="color:var(--hot)">▼</span> 스윙 고점매도',"trend",true,null,null,"r"],
    ["oh","과매수","overheat",false,"과매수",null,"s"],["os","과매도","overheat",true,"과매도",null,"s"],
    ["dip","눌림목","trend",false,"눌림목",null,"s"],["brk","52주 돌파","momentum",false,"52주돌파",null,"s"],
    ["squeeze","과밀숏","positioning",false,"과밀숏",null,"s"],
    ["up","상승추세","trend",false,"상승추세",null,"s"],["dn","200일 이탈","trend",true,"200일이탈",null,"s"],
    ["deep","깊은 눌림","overheat",true,"깊은눌림",null,"s"],
    ["bear","약세 반등","overheat",false,"약세반등",null,"s"],
    ["gold","골든 임박","trend",false,"골든임박",null,"s"],
    ["vsg","거래량 급증","momentum",false,"거래급증",null,"s"],

  function filtered(){
    var p=curP(),comp=p[2],asc=p[3],flag=p[4],tim=p[5];

        if(state.idx.size){var ok=false;(s.idx||[]).forEach(function(x){if(state.idx.has(x))ok=true;});if(!ok)return false;}
        if(state.q){var h=(s.t+' '+(s.name||'')+' '+(s.sector||'')+' '+secKo(s.sector)).toLowerCase();if(h.indexOf(state.q)<0)return false;}
        return true;});
      return {rows:fr,comp:'screen',total:fr.length,screen:p[0]};
    }
    var sk=swKeys(p[0]),sc=p[0]==='swingbuy'?'bscore':'sscore';
    var rows=DATA.stocks.filter(function(s){
      if(flag && (s.flags||[]).indexOf(flag)<0)return false;
      if(tim && tim.indexOf(s.timing)<0)return false;
      if(state.idx.size){var ok=false;(s.idx||[]).forEach(function(x){if(state.idx.has(x))ok=true;});if(!ok)return false;}
      if(state.q){var hay=(s.t+' '+(s.name||'')+' '+(s.sector||'')+' '+secKo(s.sector)).toLowerCase();if(hay.indexOf(state.q)<0)return false;}
      if(p[0]==='tgt')return (s.fund||{}).tpm!=null;   // 목표주가 탭: 목표가 보유 종목만
      if(sk)return swFresh(s,sk);                 // 스윙: 최근 SW_WIN일 내 마커 보유만
      return s.comp[comp]!=null;
    });
    // 스윙=최근 마커순(동점은 신호강도) / 매수·매도 신호=종합점수 내림차순 + 상위 50 캡(종목수 과다 방지) / 나머지=컴포짓 정렬
    var total=rows.length;
    if(sk)rows.sort(function(a,b){var d=lastMk(b,sk)-lastMk(a,sk);return d||((b[sc]||0)-(a[sc]||0));});
    else if(p[0]==='tgt')rows.sort(function(a,b){   // 상승여력(목표평균/현재가−1) 내림차순 — 사용자 지정

    return {rows:rows,comp:comp,total:total};

  // 상세 데이터(sig·pxd·vd·tp = 전체 페이로드의 72%)는 종목별 파일(data/sd/<티커>.json)에서 선택 시 지연 로드.

  function ensureDetail(s){

        s._sdLoading=0;

        if(x&&x.sig){s.sig=x.sig;s.pxd=x.pxd;s.vd=x.vd;if(x.tp)s.tp=x.tp;if(x.why)s.why=x.why;

  // 애널리스트 목표주가 — 표기 전용 블록. bscore/sscore·flags·timing 어디에도 입력하지 않으며 정렬 키로도 쓰지 않는다.

  var RKLAB={strong_buy:["적극매수","good"],buy:["매수","good"],hold:["중립","neut"],underperform:["시장하회","watch"],sell:["매도","hot"],none:["등급없음","neut"]};

    select(rows[i]);var it=listEl.querySelector('.item[aria-selected="true"]');if(it)it.scrollIntoView({block:'nearest'});
  });
