  body{margin:0;background:var(--ground);color:var(--ink);font-family:var(--sans);line-height:1.65;font-size:16px;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1200px;margin:0 auto;padding:0 22px 60px}
  header.mast{padding:40px 0 20px;border-bottom:1px solid var(--line)}
  .utilbar{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:18px}
  .eyebrow{font-family:var(--mono);font-size:11.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);font-weight:600}
  .themebtn{width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:var(--panel);color:var(--ink-2);cursor:pointer;font-size:14px;display:inline-flex;align-items:center;justify-content:center}
  .themebtn:hover{border-color:var(--accent)}
  h1.title{font-family:var(--mono);font-weight:600;font-size:clamp(24px,4.4vw,34px);line-height:1.15;margin:0}
  h1.title span.gx{background:linear-gradient(92deg,var(--accent),#2C6E8F 70%);-webkit-background-clip:text;background-clip:text;color:transparent}
  .back{font-size:13px;color:var(--muted);text-decoration:none;font-family:var(--mono)}
  .back:hover{color:var(--accent)}
  .gate{max-width:520px;margin:70px auto;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:34px 32px;box-shadow:var(--shadow)}
  .gate h2{margin:0 0 6px;font-size:19px;font-family:var(--mono)}
  .gate p{margin:0 0 20px;color:var(--muted);font-size:14px}
  .gate label{display:block;font-size:12.5px;color:var(--ink-2);margin-bottom:7px;font-weight:600}
  .gate input{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:9px;background:var(--panel-2);color:var(--ink);font-size:15px;font-family:var(--mono)}
  .gate input:focus{outline:2px solid var(--accent);outline-offset:1px;border-color:var(--accent)}
  .gate button{margin-top:14px;width:100%;padding:11px;border:none;border-radius:9px;background:var(--accent);color:var(--ground);font-weight:700;font-size:15px;cursor:pointer;font-family:var(--sans)}
  .gate button:hover{background:var(--accent-2)}
  .gate button:disabled{opacity:.55;cursor:default}
  .gerr{margin-top:12px;color:var(--hot);font-size:13.5px;min-height:20px}
  .ghint{margin-top:18px;padding-top:16px;border-top:1px solid var(--line-soft);font-size:12px;color:var(--muted);line-height:1.6}
  @media(max-width:640px){.wrap{padding:0 14px 40px}}

      var pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b642buf(P.iv)},key,b642buf(P.ct));
      var html=new TextDecoder().decode(pt);
      /* 이 페이지들은 인라인 스크립트가 실행돼야 동작한다.
         innerHTML 주입은 스크립트를 실행하지 않으므로 문서 전체를 교체한다. */
      document.open('text/html');
      document.write(html);
      document.close();
    }catch(e){
      err.textContent='암호가 올바르지 않습니다.'; go.disabled=false; pw.select();
    }
  }
  go.addEventListener('click',unlock);
  pw.addEventListener('keydown',function(e){if(e.key==='Enter')unlock();});
  if(!(crypto&&crypto.subtle)){err.textContent='이 브라우저는 WebCrypto를 지원하지 않습니다 (HTTPS 필요).';go.disabled=true;}
})();
</script>
</body>
</html>
