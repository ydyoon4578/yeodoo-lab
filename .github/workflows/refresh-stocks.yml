name: Refresh stock signals (yfinance)

on:
  schedule:
    - cron: '30 22 * * 1-5'   # 평일 22:30 UTC ≈ 미국장 마감 후 (KST 익일 07:30)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-stocks
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: pip install --quiet pandas numpy yfinance
      - name: Compute technical signals
        run: python build/refresh_stocks.py
      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain data/stocks.json)" ]; then
            git add data/stocks.json
            git commit -m "chore(data): 종목 테크니컬 시그널 자동 갱신"
            git push
            echo "갱신·푸시 완료 → GitHub Pages(branch source) 자동 재빌드"
          else
            echo "변경 없음 — 스킵"
          fi
