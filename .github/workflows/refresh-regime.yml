name: Refresh market regime (FRED)

on:
  schedule:
    - cron: '45 22 * * *'    # 매일 07:45 KST (22:45 UTC 전일) — stocks(07:35)와 분(minute) 어긋나게: 같은 브랜치 동시 push 경쟁 회피
    - cron: '20 23 * * *'    # 08:20 KST 백업 (stocks 08:10 백업과도 분리)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-regime
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: pip install --quiet pandas numpy yfinance fredapi
      - name: Compute market regime
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python build/refresh_regime.py
      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain data/regime.json)" ]; then
            git add data/regime.json
            git commit -m "chore(data): 시장 국면(레짐) 자동 갱신"
            # stocks 워크플로와 같은 main에 push → 경합 시 리베이스 후 1회 재시도
            git push || (git pull --rebase origin main && git push)
            echo "갱신·푸시 완료 → GitHub Pages 자동 재빌드"
          else
            echo "변경 없음 — 스킵"
          fi
